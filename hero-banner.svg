<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0B1A"/>
      <stop offset="100%" stop-color="#181330"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7FFF"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A3F8F"/>
      <stop offset="100%" stop-color="#382E6E"/>
    </linearGradient>
    <linearGradient id="cubeRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5D4FBE"/>
      <stop offset="100%" stop-color="#453A8F"/>
    </linearGradient>
    <linearGradient id="cubeTopAlert" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9E9E"/>
      <stop offset="100%" stop-color="#E8555F"/>
    </linearGradient>
    <linearGradient id="cubeLeftAlert" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8F3F45"/>
      <stop offset="100%" stop-color="#6E2E33"/>
    </linearGradient>
    <linearGradient id="cubeRightAlert" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BE4F56"/>
      <stop offset="100%" stop-color="#8F3A40"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B7FFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B7FFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="320" fill="url(#bgGrad)"/>
  <circle cx="450" cy="90" r="220" fill="url(#glow)"/>

  <text x="450" y="46" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="26" font-weight="700" fill="#EDEBFF">Aditya Vardhan</text>
  <text x="450" y="68" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="12" fill="#9B93C9">backend engineer · distributed systems · 10M+ events/day</text>

  <!-- isometric cube macro -->
  <!-- cube 1: api-gateway -->
  <g transform="translate(150,150)">
    <polygon points="0,-20 40,-40 80,-20 40,0" fill="url(#cubeTop)"/>
    <polygon points="0,-20 40,0 40,40 0,20" fill="url(#cubeLeft)"/>
    <polygon points="80,-20 40,0 40,40 80,20" fill="url(#cubeRight)"/>
    <text x="40" y="65" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9B93C9">api-gateway</text>
  </g>

  <!-- cube 2: loan-service -->
  <g transform="translate(330,110)">
    <polygon points="0,-20 40,-40 80,-20 40,0" fill="url(#cubeTop)"/>
    <polygon points="0,-20 40,0 40,40 0,20" fill="url(#cubeLeft)"/>
    <polygon points="80,-20 40,0 40,40 80,20" fill="url(#cubeRight)"/>
    <text x="40" y="65" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9B93C9">loan-service</text>
  </g>

  <!-- cube 3: payments-svc -->
  <g transform="translate(510,150)">
    <polygon points="0,-20 40,-40 80,-20 40,0" fill="url(#cubeTop)"/>
    <polygon points="0,-20 40,0 40,40 0,20" fill="url(#cubeLeft)"/>
    <polygon points="80,-20 40,0 40,40 80,20" fill="url(#cubeRight)"/>
    <text x="40" y="65" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#9B93C9">payments-svc</text>
  </g>

  <!-- cube 4: ledger-svc (alert, pulsing) -->
  <g transform="translate(690,110)">
    <polygon points="0,-20 40,-40 80,-20 40,0" fill="url(#cubeTopAlert)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-20 40,0 40,40 0,20" fill="url(#cubeLeftAlert)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="80,-20 40,0 40,40 80,20" fill="url(#cubeRightAlert)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
    </polygon>
    <text x="40" y="65" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#FF9E9E">ledger-svc ⚠</text>
  </g>

  <!-- connecting paths -->
  <path id="p1" d="M 190,190 Q 270,160 370,150" fill="none" stroke="#4A3F8F" stroke-width="1.5" opacity="0.6"/>
  <path id="p2" d="M 410,150 Q 470,140 550,170" fill="none" stroke="#4A3F8F" stroke-width="1.5" opacity="0.6"/>
  <path id="p3" d="M 590,170 Q 650,150 730,150" fill="none" stroke="#4A3F8F" stroke-width="1.5" opacity="0.6"/>

  <!-- flowing particles along paths -->
  <circle r="3.5" fill="#B8AEFF">
    <animateMotion dur="2.2s" repeatCount="indefinite">
      <mpath href="#p1"/>
    </animateMotion>
  </circle>
  <circle r="3.5" fill="#B8AEFF">
    <animateMotion dur="2.2s" begin="0.4s" repeatCount="indefinite">
      <mpath href="#p1"/>
    </animateMotion>
  </circle>
  <circle r="3.5" fill="#B8AEFF">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#p2"/>
    </animateMotion>
  </circle>
  <circle r="3.5" fill="#F0A93E">
    <animateMotion dur="1.8s" repeatCount="indefinite">
      <mpath href="#p3"/>
    </animateMotion>
  </circle>
  <circle r="3.5" fill="#F0A93E">
    <animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite">
      <mpath href="#p3"/>
    </animateMotion>
  </circle>

  <text x="450" y="230" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#6B6485">live event flow across a distributed system — one node flagged anomalous</text>

  <!-- stats row -->
  <g transform="translate(0,260)">
    <text x="150" y="20" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700" fill="#B8AEFF">10M+</text>
    <text x="150" y="36" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">EVENTS/DAY</text>

    <text x="450" y="20" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700" fill="#8FD19E">6.59M</text>
    <text x="450" y="36" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">TRACES ANALYZED</text>

    <text x="750" y="20" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700" fill="#F0A93E">99.7%</text>
    <text x="750" y="36" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">ANOMALY SIGNAL</text>
  </g>
</svg>

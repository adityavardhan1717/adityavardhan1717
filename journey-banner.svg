<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D0B1A"/>
      <stop offset="100%" stop-color="#181330"/>
    </linearGradient>
  </defs>
  <rect width="900" height="160" rx="10" fill="url(#jbg)"/>

  <!-- base line -->
  <line x1="80" y1="80" x2="820" y2="80" stroke="#332C4A" stroke-width="2"/>
  <!-- animated fill line -->
  <line x1="80" y1="80" x2="80" y2="80" stroke="#8B7FFF" stroke-width="2">
    <animate attributeName="x2" values="80;820" dur="2.4s" fill="freeze"/>
  </line>

  <!-- node 1 -->
  <circle cx="130" cy="80" r="7" fill="#6C5CE7"/>
  <text x="130" y="55" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#EDEBFF">Wipro</text>
  <text x="130" y="105" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">2021 – 2022</text>
  <text x="130" y="120" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#9B93C9">Project Engineer</text>

  <!-- node 2 -->
  <circle cx="360" cy="80" r="7" fill="#6C5CE7"/>
  <text x="360" y="55" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#EDEBFF">Muthoot Fincorp One</text>
  <text x="360" y="105" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">2022 – 2024</text>
  <text x="360" y="120" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#9B93C9">SDE II · Kafka backbone</text>

  <!-- node 3 -->
  <circle cx="600" cy="80" r="7" fill="#6C5CE7"/>
  <text x="600" y="55" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#EDEBFF">TUS Limerick</text>
  <text x="600" y="105" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">2025 – 2026</text>
  <text x="600" y="120" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#9B93C9">MSc Data Analytics</text>

  <!-- node 4: now, pulsing -->
  <circle cx="800" cy="80" r="8" fill="#F0A93E">
    <animate attributeName="r" values="8;11;8" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="800" y="55" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#F0A93E">Now</text>
  <text x="800" y="105" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6B6485">2026</text>
  <text x="800" y="120" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#F0A93E">Open to roles</text>
</svg>
